name: RecipesMobile
options:
  deploymentTarget:
    iOS: "17.0"
packages: {}
targets:
  RecipesMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recipes.mobile.dev
        PRODUCT_NAME: Ingrediential
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ingrediential
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Voice input lets you dictate recipe ingredients.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Speech recognition converts dictated ingredients into text.
        RECIPES_API_BASE_URL: https://api.yourdomain.com
    scheme:
      testTargets: []
