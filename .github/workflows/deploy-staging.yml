name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - '.github/workflows/deploy-staging.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Backend tests
        run: go test ./server/...

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Web build
        run: pnpm --dir web build

  deploy-web:
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger web deploy hook
        env:
          WEB_STAGING_DEPLOY_HOOK: ${{ secrets.WEB_STAGING_DEPLOY_HOOK }}
        run: |
          test -n "$WEB_STAGING_DEPLOY_HOOK"
          curl -fsS -X POST "$WEB_STAGING_DEPLOY_HOOK"

  deploy-api:
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        service:
          - API_RECIPES_STAGING_DEPLOY_HOOK
          - API_USERS_STAGING_DEPLOY_HOOK
          - API_FAVORITES_STAGING_DEPLOY_HOOK
    steps:
      - name: Trigger API deploy hook
        env:
          API_RECIPES_STAGING_DEPLOY_HOOK: ${{ secrets.API_RECIPES_STAGING_DEPLOY_HOOK }}
          API_USERS_STAGING_DEPLOY_HOOK: ${{ secrets.API_USERS_STAGING_DEPLOY_HOOK }}
          API_FAVORITES_STAGING_DEPLOY_HOOK: ${{ secrets.API_FAVORITES_STAGING_DEPLOY_HOOK }}
          SERVICE_KEY: ${{ matrix.service }}
        run: |
          URL=$(printenv "$SERVICE_KEY")
          test -n "$URL"
          curl -fsS -X POST "$URL"
