name: Mobile iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile/ios-native/**'
      - 'docs/mobile/**'
      - '.github/workflows/mobile-ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/ios-native/**'
      - 'docs/mobile/**'
      - '.github/workflows/mobile-ios.yml'
  workflow_dispatch:
    inputs:
      lane:
        description: "Release lane"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - beta
          - production

jobs:
  build-internal:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile/ios-native/RecipesMobile

    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project RecipesMobile.xcodeproj \
            -scheme RecipesMobile \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.lane != 'internal' }}
    needs: build-internal
    runs-on: macos-14
    environment: ${{ inputs.lane == 'production' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: mobile/ios-native/RecipesMobile

    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build archive (requires signing setup)
        if: ${{ secrets.IOS_BUILD_CERT_BASE64 != '' && secrets.IOS_BUILD_CERT_PASSWORD != '' && secrets.IOS_BUILD_PROVISION_BASE64 != '' }}
        run: |
          echo "iOS signing assets detected. Configure archive/export steps for your Apple account in this lane."
          xcodebuild \
            -project RecipesMobile.xcodeproj \
            -scheme RecipesMobile \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Release not configured
        if: ${{ secrets.IOS_BUILD_CERT_BASE64 == '' || secrets.IOS_BUILD_CERT_PASSWORD == '' || secrets.IOS_BUILD_PROVISION_BASE64 == '' }}
        run: |
          echo "Skipping iOS release lane: missing one or more secrets"
          echo "Required: IOS_BUILD_CERT_BASE64, IOS_BUILD_CERT_PASSWORD, IOS_BUILD_PROVISION_BASE64"
