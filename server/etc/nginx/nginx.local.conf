events {
  worker_connections 1024;
}

http {
  upstream web_upstream {
    server web:3000;
  }

  upstream recipes_upstream {
    server recipes_server:8081;
  }

  upstream users_upstream {
    server users_server:8082;
  }

  upstream favorites_upstream {
    server favorites_server:8080;
  }

  server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    location /api/users/ {
      rewrite ^/api/users/(.*)$ /users/$1 break;
      proxy_pass http://users_upstream;
    }

    location /api/favorites/ {
      rewrite ^/api/favorites/(.*)$ /favorites/$1 break;
      proxy_pass http://favorites_upstream;
    }

    location /api/recipes/ {
      rewrite ^/api/recipes/(.*)$ /recipes/$1 break;
      proxy_pass http://recipes_upstream;
    }

    location /api/ingredients/ {
      rewrite ^/api/ingredients/(.*)$ /ingredients/$1 break;
      proxy_pass http://recipes_upstream;
    }

    location /metrics/users {
      proxy_pass http://users_upstream/users/metrics;
    }

    location /metrics/favorites {
      proxy_pass http://favorites_upstream/favorites/metrics;
    }

    location /metrics/recipes {
      proxy_pass http://recipes_upstream/recipes/metrics;
    }

    location / {
      proxy_pass http://web_upstream;
    }
  }
}
