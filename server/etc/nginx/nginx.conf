http {
    # Include necessary mime types and other global configurations here

    server {
        listen 80;
        server_name localhost; # Replace with your domain name if you have one

        # Location block for the first application (e.g., accessed via http://localhost/favorites)
        location /favorites/ {
            proxy_pass http://localhost:8080/;
            # Optional: Recommended headers for forwarding client information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-NginX-Proxy true;
        }

        # Location block for the second application (e.g., accessed via http://localhost/recipes)
        location /recipes/ {
            proxy_pass http://localhost:8081/;
            # Optional: Recommended headers for forwarding client information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-NginX-Proxy true;
        }

        # Location block for the second application (e.g., accessed via http://localhost/users)
        location /users/ {
            proxy_pass http://localhost:8082/;
            # Optional: Recommended headers for forwarding client information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-NginX-Proxy true;
        }

        # Default location for the root path (optional, can serve a default page or another service)
        location / {
            # Example: serve static files from a directory
            # root /var/www/html;
            # index index.html index.htm;
            
            # Or proxy to a default application
            proxy_pass http://localhost:8080/; 
        }
    }
}
